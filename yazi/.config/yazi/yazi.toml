# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.# ==============================================================================
# YAZI CONFIGURATION (2026 Edition)
# Optimized for Arch Linux + Hyprland + Kitty + NvChad
# ==============================================================================

[manager]
ratio          = [ 1, 4, 3 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true

# ------------------------------------------------------------------------------
# OPENER DEFINITIONS (The "Tools")
# ------------------------------------------------------------------------------
[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Neovim" },
]
play = [
    { run = 'mpv --force-window "$@"', orphan = true, desc = "mpv" },
]
open = [
    { run = 'xdg-open "$@"', orphan = true, desc = "Open" },
]

# ------------------------------------------------------------------------------
# OPEN RULES (The "Logic")
# ------------------------------------------------------------------------------
[open]
rules = [
    # Folder
    { name = "*/", use = [ "edit", "open" ] },
    # Code & Text (Force .py to NvChad even if MIME is weird)
    { name = "*.{py,js,json,toml,lua,sh,md,cpp,c,html,css}", use = "edit" },
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    # Video & Audio
    { mime = "video/*", use = "play" },
    { mime = "audio/*", use = "play" },
    # PDF
    { name = "*.pdf", use = "open" },
    { mime = "application/pdf", use = "open" },
    # Image
    { mime = "image/*", use = "open" },
    # Fallback
    { name = "*", use = "open" }
]

# ------------------------------------------------------------------------------
# PREVIEW SETTINGS (The "Look")
# ------------------------------------------------------------------------------
[preview]
tab_size        = 2
max_width       = 600
max_height      = 900
image_filter    = "triangle"
image_quality   = 75

[[preview.rules]]
name = "*.{jpg,jpeg,png,webp,gif,svg,bmp}"
use  = "image"

[[preview.rules]]
name = "*.{pdf,epub,cbz,djvu}"
use  = "pdf"

[[preview.rules]]
name = "*/"
use  = "directory"

[[preview.rules]]
name = "*"
use  = "code"

# ------------------------------------------------------------------------------
# INPUT & SELECT (UI Elements)
# ------------------------------------------------------------------------------
[input]
# Position for the "rename" or "create" prompt
cursor_blink = false

[select]
open_title  = "Open with:"
open_origin = "top-center"
open_offset = [ 0, 2, 50, 7 ]
